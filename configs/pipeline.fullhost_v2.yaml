dataset_id: ragap_phi
artifact_root: "{project_root}/artifacts/{dataset_id}"

execution:
  conda_bin: conda

inputs:
  taxonomy_alias_parquet: "{project_root}/data/taxonomy/taxonomy_with_alias.parquet"
  taxid2species_tsv: "{project_root}/data/metadata/taxid_species.tsv"

tools:
  dna_embed_script: "{project_root}/scripts/dna_bert_embed.py"
  phage_esm_script: "{project_root}/scripts/generate_esm_embeddings_phage.py"

dna_embedding:
  phage:
    model: "{project_root}/assets/models/DNA_bert_4"
    k: 4
    window_tokens: 510
    stride_tokens: 510
    batch_size: 8
    precision: fp16
    max_windows: 800
    seed: 13

phage_protein_prep:
  phanotate_bin: phanotate.py
  extra_args: []

phage_protein_embedding:
  model_name: esm2_t33_650M_UR50D
  repr_l: 32
  batch_size: 4
  workers: 1

build_catalogs:
  host_catalog: "{artifact_root}/catalogs/host_catalog.parquet"

cluster_assets:
  sourmash_work_dir: "{artifact_root}/cluster/sourmash"
  similarity_edges:
    sourmash_env: RAGAP
    sourmash_bin: sourmash
    scaled: 1000
    phage:
      kmer_size: 21
      threshold: 0.8
